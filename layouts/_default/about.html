{{ define "title" }}
  {{ .Title }} · {{ .Site.Title }}
{{ end }}
{{ define "content" }}
  <section class="container about-page">
    <div class="about-hero centered">
      <div class="about">
        {{ partialCached "home/avatar.html" . }}
        {{ partialCached "home/author.html" . }}
        {{ partialCached "home/social.html" . }}
      </div>
    </div>
    <article class="about-body">
      {{ .Content }}
    </article>
  </section>
{{ end }}
