baseURL = "https://deeplearning.earth/"
languageCode = "en-us"
title = "DeepLearning.Earth"

theme = "hugo-coder"
defaultContentLanguage = "en-us"

paginate = 20
canonifyUrls = true

[markup]
	[markup.highlight]
		codeFences = true
		style = "monokai"
		guessSyntax = false

mainSections = ["posts"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
    author = "Jeff Faudi"
    info = "Oriented object detection for Earth Observation — notes on the **oriented-det** package and related work."
    description = "Technical blog on oriented object detection for Earth Observation and the oriented-det package."
    keywords = "oriented detection, earth observation, satellite imagery, oriented-det, deep learning, object detection"
    avatarurl = "images/JEFFAUDI_SQ.jpg"
    #logoURL = "images/logo-black.png"

    favicon_32 = "/images/favicon.png"
    favicon_16 = "/images/favicon.png"

    footercontent = "DL4EO"

    hidecredits = false
    hidecopyright = false

    rtl = false

    math = true
    customCSS = ["css/custom.css", "css/medium-zoom.css"]
    customJS = ["js/medium-zoom.min.js", "js/image-zoom.js"]

